backend:
  name: github
  repo: yishayraziel/yrazielcom
  branch: main
  base_url: https://yraziel.com
  auth_endpoint: /oauth/auth

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "works"
    label: "Works"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{client}}"
    sortable_fields: ['date', 'title', 'client']
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "YouTube URL", name: "youtube", widget: "string", hint: "Paste the full YouTube URL" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: []
        hint: "Type each tag and press Enter. Common tags: TV, Radio, Digital, Automotive, Beverage, Commercial, Education, Eyewear, Fashion, Finance, Food, Home, Insurance, Kids, Nature, Personal, Pets, Pharma, Public, Real Estate, Retail, Telecom, Tourism."
      - { label: "Notes (optional)", name: "body", widget: "markdown", required: false }
