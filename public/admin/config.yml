backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "works"
    label: "Works"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{client}}"
    sortable_fields: ['date', 'title', 'client']
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "YouTube URL", name: "youtube", widget: "string", hint: "Paste the full YouTube URL" }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        create: true
        default: []
        options: ["TV","Radio","Digital","Automotive","Beverage","Commercial","Education","Eyewear","Fashion","Finance","Food","Home","Insurance","Kids","Nature","Personal","Pets","Pharma","Public","Real Estate","Retail","Telecom","Tourism"]
        hint: "Pick from the list or type a new tag and press Enter. Add as many as you want."
      - { label: "Notes (optional)", name: "body", widget: "markdown", required: false }
