<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.3.0/dist/decap-cms.js"></script>
    <script>
      // Before deploying, fill in your GitHub repo below.
      // Locally, `local_backend: true` routes writes to decap-server
      // (which must be running: `npx decap-server`), so edits land in
      // src/content/works/ and the Astro dev server hot-reloads.
      CMS.init({
        config: {
          local_backend: true,
          backend: {
            name: 'git-gateway',
            branch: 'main',
          },
          load_config_file: false,
          media_folder: 'public/uploads',
          public_folder: '/uploads',
          publish_mode: 'simple',
          collections: [
            {
              name: 'works',
              label: 'Works',
              folder: 'src/content/works',
              create: true,
              slug: '{{slug}}',
              extension: 'md',
              format: 'frontmatter',
              summary: '{{title}} — {{client}}',
              sortable_fields: ['date', 'title', 'client'],
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Client', name: 'client', widget: 'string' },
                {
                  label: 'Date',
                  name: 'date',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                  picker_utc: true,
                },
                {
                  label: 'YouTube URL',
                  name: 'youtube',
                  widget: 'string',
                  hint: 'Paste the full YouTube URL',
                },
                {
                  label: 'Tags',
                  name: 'tags',
                  widget: 'list',
                  default: [],
                  hint: 'Type each tag and press Enter. Common tags: TV, Radio, Digital, Automotive, Beverage, Commercial, Education, Eyewear, Fashion, Finance, Food, Home, Insurance, Kids, Nature, Personal, Pets, Pharma, Public, Real Estate, Retail, Telecom, Tourism.',
                },
                {
                  label: 'Notes (optional)',
                  name: 'body',
                  widget: 'markdown',
                  required: false,
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
